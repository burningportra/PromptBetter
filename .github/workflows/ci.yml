name: CI

on:
  push:
    branches: [main, 'session/**', 'feat/**', 'fix/**']
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint, Typecheck, Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Dependency direction lint
        run: npm run lint

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test
